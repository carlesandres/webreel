name: Release Compositor

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
            binary: webreel-linux-x64
          - os: ubuntu-latest
            target: aarch64-linux
            binary: webreel-linux-arm64
          - os: macos-latest
            target: x86_64-macos
            binary: webreel-darwin-x64
          - os: macos-latest
            target: aarch64-macos
            binary: webreel-darwin-arm64
          - os: windows-latest
            target: x86_64-windows
            binary: webreel-windows-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: goto-bus-stop/setup-zig@abea47f85e598557f500fa1fd2ab7464fcb39406 # v2
        with:
          version: 0.15.2

      - name: Fetch deps
        working-directory: packages/@webreel/compositor
        run: bash scripts/fetch-deps.sh

      - name: Build
        working-directory: packages/@webreel/compositor
        run: |
          zig build \
            -Doptimize=ReleaseFast \
            -Dtarget=${{ matrix.target }} \
            -Dexe-name=webreel

      - name: Rename binary
        working-directory: packages/@webreel/compositor
        run: |
          mkdir -p dist
          cp zig-out/bin/webreel dist/${{ matrix.binary }} 2>/dev/null || \
          cp zig-out/bin/webreel.exe dist/${{ matrix.binary }}.exe 2>/dev/null

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.binary }}
          path: packages/@webreel/compositor/dist/${{ matrix.binary }}*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f ! -name 'checksums.txt' | sort | while read -r f; do
            sha256sum "$f"
          done > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: |
            artifacts/**/*
            artifacts/checksums.txt
          generate_release_notes: true
